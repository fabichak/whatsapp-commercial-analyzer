negotiation_rules:
  no_unsolicited_discount: true
  mon_wed_5pct_dayspa: true
  no_price_before_interest: true

objection_taxonomy:
  - id: "price"
    name_pt: "Preço / valor alto"
    triggers: ["caro", "achei caro", "muito caro", "ta caro", "valor alto", "não cabe", "acima do orçamento", "tô ruim de grana", "tô apertado"]
  - id: "location"
    name_pt: "Localização / distância"
    triggers: ["longe", "muito longe", "onde fica", "qual endereço", "não dá pra ir", "fica aonde", "bairro", "fora de mão"]
  - id: "time_slot"
    name_pt: "Horário / agenda"
    triggers: ["não tenho horário", "sem tempo", "essa semana não dá", "só consigo depois", "agenda cheia", "qual horário", "horário disponível"]
  - id: "competitor"
    name_pt: "Outro spa / concorrente"
    triggers: ["outro lugar", "outro spa", "já fui em outro", "prefiro o", "conhecido de"]
  - id: "hesitation_vou_pensar"
    name_pt: "Hesitação genérica"
    triggers: ["vou pensar", "depois te falo", "deixa eu ver", "preciso pensar", "vou analisar"]
  - id: "delegated_talk_to_someone"
    name_pt: "Precisa consultar alguém"
    triggers: ["vou falar com meu marido", "vou ver com minha esposa", "combinar com", "falar com minha mãe", "depende da"]
  - id: "delayed_response_te_falo"
    name_pt: "Resposta adiada"
    triggers: ["te falo", "te retorno", "depois te aviso", "amanhã te respondo", "mais tarde te falo"]
  - id: "trust_boundary_male"
    name_pt: "Cliente masculino testando limites"
    triggers: ["foto", "pode mandar foto", "tem final feliz", "que tipo de massagem", "toque íntimo"]
  - id: "other"
    name_pt: "Outra objeção"
    triggers: []

